# =============================================================================
# LanguageTool Server Configuration — EN + ES
# =============================================================================

# --- Performance ---
cacheSize=1000
maxTextLength=50000
maxCheckTimeMillis=10000
maxCheckThreads=2

# --- Pipeline ---
pipelinePrewarming=false
pipelineCaching=true
maxPipelinePoolSize=2

# --- Request Limits ---
requestLimit=30
requestLimitInBytes=100000
requestLimitPeriodInSeconds=60
trustXForwardForHeader=true
